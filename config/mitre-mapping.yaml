    framework: ATT&CK
    technique: "Exfiltration Over Unencrypted Non-C2 Protocol"
  shadow_ai_detected:
    mitre_id: T1213.002
    framework: ATT&CK
    technique: "Data from Information Repositories: Sharepoint"
  mnpi_detected:
    mitre_id: AML.T0025
    framework: ATLAS
    technique: "Exfiltration from AI System"
  firewall_violation:
