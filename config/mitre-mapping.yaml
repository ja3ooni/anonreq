# MITRE ATT&CK / ATLAS technique ID mappings for AI security events.
#
# Per D-013 through D-016:
# - Maps every security event_type to a MITRE ATT&CK for Enterprise or
#   ATLAS technique ID
# - Applied at the event normalizer stage, before sink formatting
# - Covers all security event types from Phases 10, 13, 12, 8, 17, 18
# - Unknown event types receive TEMP:UNMAPPED fallback

