# Classification rules for AnonReq.
#
# Per D-22 through D-28:
# - Rules are evaluated in action-priority order (BLOCK > ROUTE_LOCAL >
#   ANONYMIZE > PASS), not in list order.
# - Conditions are ANDed: roles, regex, AND keywords must all match.
# - No expression language (OR/NOT) in MVP (D-26).
# - Default action for unmatched requests: PASS (D-28).
#
# Each rule supports:
#   id:       Stable unique identifier (D-22)
#   enabled:  true/false — disabled rules are skipped
#   version:  Integer version for auditability (D-27)
#   name:     Human-readable name
#   action:   BLOCK | ROUTE_LOCAL | ANONYMIZE | PASS (D-24)
#   metadata: Key-value map for owner, category, severity, etc.
#   conditions:
#     roles:    List of message roles to match (empty = all roles)
#     regex:    List of regex patterns (ANDed)
#     keywords: List of case-insensitive keywords (ANDed)
#
# default_action: PASS — unmatched requests pass through unmodified.

default_action: PASS

rules:
  - id: CLS-001
    enabled: true
    version: 1
    name: block_credentials
    action: BLOCK
    metadata:
      owner: security-team
      category: credentials
      severity: critical
    conditions:
      roles: [user]
      regex:
        - "(?i)(password|secret|api.?key)\\s*[:=]\\s*\\S+"
      keywords: []

  - id: CLS-002
    enabled: true
    version: 1
    name: block_pii_requests
    action: BLOCK
    metadata:
      owner: security-team
      category: pii_leak
      severity: high
    conditions:
      roles: [user]
      regex:
        - "(?i)(social.security|credit.card|passport|national.id)"
      keywords: []
