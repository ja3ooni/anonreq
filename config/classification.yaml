# Classification rules for AnonReq.
#
# Per D-22 through D-28:
# - Rules are evaluated in action-priority order (BLOCK > ROUTE_LOCAL >
#   ANONYMIZE > PASS), not in list order.
# - Conditions are ANDed: roles, regex, AND keywords must all match.
# - No expression language (OR/NOT) in MVP (D-26).
# - Default action for unmatched requests: PASS (D-28).
#
# Each rule supports:
#   id:       Stable unique identifier (D-22)
#   enabled:  true/false — disabled rules are skipped
#   version:  Integer version for auditability (D-27)
#   name:     Human-readable name
#   action:   BLOCK | ROUTE_LOCAL | ANONYMIZE | PASS (D-24)
#   metadata: Key-value map for owner, category, severity, etc.
#   conditions:
#     roles:    List of message roles to match (empty = all roles)
#     regex:    List of regex patterns (ANDed within a rule)
#     keywords: List of case-insensitive keywords (OR'd with regex)
#
# default_action: PASS — unmatched requests pass through unmodified.

default_action: PASS

rules:
  - id: CLS-001
    enabled: true
    version: 1
    name: block_credentials
    action: BLOCK
    metadata:
      owner: security-team
      category: credentials
      severity: critical
    conditions:
      roles: [user]
      regex:
        - "(?i)(?:password|secret|api.?key|token)\\s*[:=]\\s*\\S+"
      keywords: []

  - id: CLS-002
    enabled: true
    version: 1
    name: block_ssn_pattern
    action: BLOCK
    metadata:
      owner: security-team
      category: pii_high
      severity: critical
    conditions:
      roles: []
      regex:
        - "\\b(?!000|666|9\\d{2})\\d{3}-(?!00)\\d{2}-(?!0000)\\d{4}\\b"
      keywords: []

  - id: CLS-003
    enabled: false
    version: 1
    name: route_internal_knowledge_base
    action: ROUTE_LOCAL
    metadata:
      owner: engineering
    conditions:
      roles: [user]
      regex: []
      keywords: ["internal knowledge", "company policy", "hr handbook"]

  - id: CLS-004
    enabled: true
    version: 1
    name: anonymize_pii_requests
    action: ANONYMIZE
    metadata:
      owner: security-team
      category: pii
    conditions:
      roles: [user, assistant, tool]
      regex: []
      keywords: ["email", "phone", "address", "ssn", "credit card", "my name is"]

# ---------------------------------------------------------------------------
# Phase 12: Entity-type-to-classification mapping (CLASS-01, CLASS-02)
# ---------------------------------------------------------------------------
# Default sensitivity levels per entity type. Used by ClassificationEngine
# (anonreq.services.classification_engine) to compute the highest-sensitivity
# level for each request using the deterministic max algorithm.
#
# Overridable per tenant via Phase 8 policy YAML
# (config/policies/default.yaml → classification.entity_mapping).
# Unknown entity types default to INTERNAL.

classification:
  version: 1

  levels:
    PUBLIC:
      display_name: "Public"
      ordinal: 0
      description: "No sensitivity — publicly available information"
    INTERNAL:
      display_name: "Internal"
      ordinal: 1
      description: "Internal business data — default for undetected"
    CONFIDENTIAL:
      display_name: "Confidential"
      ordinal: 2
      description: "Sensitive business data — requires anonymization"
    RESTRICTED:
      display_name: "Restricted"
      ordinal: 3
      description: "Highly sensitive — requires anonymization + audit"
    HIGHLY_RESTRICTED:
      display_name: "Highly Restricted"
      ordinal: 4
      description: "Critical — blocked from external providers (HTTP 451)"

  entity_mapping:
    # Internal (Level 1)
    PERSON: INTERNAL
    LOCATION: INTERNAL
    DATE_TIME: INTERNAL
    NRP: INTERNAL
    AGE: INTERNAL
    DOMAIN_NAME: INTERNAL
    ORGANIZATION: INTERNAL
    ZIP_CODE: INTERNAL
    IP_ADDRESS: INTERNAL

    # Confidential (Level 2)
    EMAIL: CONFIDENTIAL
    PHONE: CONFIDENTIAL
    URL: CONFIDENTIAL
    CRYPTO: CONFIDENTIAL

    # Restricted (Level 3)
    CREDIT_CARD: RESTRICTED
    CREDIT_CARD_TYPE: RESTRICTED
    IBAN: RESTRICTED
    SWIFT: RESTRICTED
    BANK_ACCOUNT: RESTRICTED
    SSN: RESTRICTED
    MEDICAL_LICENSE: RESTRICTED
    DRIVERS_LICENSE: RESTRICTED
    PASSPORT: RESTRICTED
    TAX_ID: RESTRICTED
    HEALTH_INFO: RESTRICTED

    # Highly Restricted (Level 4)
    API_KEY: HIGHLY_RESTRICTED
    PASSWORD: HIGHLY_RESTRICTED
    AUTH_TOKEN: HIGHLY_RESTRICTED
    SOURCE_CODE: HIGHLY_RESTRICTED

  # Default per-level handling policy (overridable in Phase 8 tenant policy)
  handling:
    PUBLIC:
      action: PASS
    INTERNAL:
      action: PASS
    CONFIDENTIAL:
      action: ANONYMIZE
    RESTRICTED:
      action: ANONYMIZE
      audit_flag: true
    HIGHLY_RESTRICTED:
      action: BLOCK
      http_status: 451
