# =============================================================================
# AnonReq — Docker Compose orchestration
# =============================================================================
# Services on an isolated internal bridge network:
#   1. valkey          — ephemeral cache (persistence disabled)
#   2. presidio-analyzer — PII detection engine
#   3. anonreq         — anonymization gateway (build from Dockerfile)
#
# Observability profile services:
#   4. postgres        — PostgreSQL database for audit logs
#   5. postgres-exporter — Prometheus metric exporter for PostgreSQL
#   6. minio           — MinIO object storage for compliance archives
#   7. prometheus      — Metrics collection and alerting engine
#   8. grafana         — Visualization dashboards
#   9. valkey-exporter — Prometheus metric exporter for Valkey
#
# Production deployments should terminate TLS at a reverse proxy
# (e.g., nginx, Caddy, Cloudflare Tunnel) upstream of the gateway.
# The gateway itself does not handle TLS termination.
# =============================================================================

services:

  # -------------------------------------------------------------------------
  # Valkey — ephemeral key-value store (Redis-compatible)
  # -------------------------------------------------------------------------
  valkey:
    image: valkey/valkey:8
    container_name: anonreq-valkey
    command:
      - valkey-server
      - --save ""
      - --appendonly no
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - anonreq-net
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Presidio Analyzer — PII / PHI detection
  # -------------------------------------------------------------------------
  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:latest
    container_name: anonreq-presidio
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:3000/health', timeout=5).read()"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - anonreq-net
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # AnonReq Gateway — anonymization proxy
  # -------------------------------------------------------------------------
  anonreq:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anonreq-gateway
    user: root
    command:
      - sh
      - -c
      - >
        mkdir -p /app/data/ca &&
        chown -R anonreq:anonreq /app/data &&
        exec su anonreq -s /bin/sh -c
        'uvicorn anonreq.main:app --host 0.0.0.0 --port 8080 --no-server-header'
    ports:
      - "8080:8080"
    environment:
      ANONREQ_API_KEY: ${ANONREQ_API_KEY:?err}
      PROVIDER_API_KEY: ${PROVIDER_API_KEY:?err}
      PROVIDER_BASE_URL: ${PROVIDER_BASE_URL:-https://api.openai.com}
      ANONREQ_VALKEY_URL: redis://valkey:6379/0
      ANONREQ_PRESIDIO_URL: http://presidio-analyzer:3000
      ANONREQ_POLICY_CONFIG_PATH: config/enterprise-policy.yaml
      ANONREQ_DATABASE_URL: ${ANONREQ_DATABASE_URL:-sqlite+aiosqlite:////app/data/anonreq.db}
      ANONREQ_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?err}
      ANONREQ_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?err}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?err}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?err}
      MINIO_SECURE: "false"
      ANONREQ_BREACH_WEBHOOK_URL: ${ANONREQ_BREACH_WEBHOOK_URL:-}
      ANONREQ_ANCHOR_SIGNING_KEY: ${ANONREQ_ANCHOR_SIGNING_KEY:-}
      ANONREQ_LOG_LEVEL: ${ANONREQ_LOG_LEVEL:-INFO}
      ANONREQ_HOST: 0.0.0.0
      ANONREQ_PORT: "8080"
      ANONREQ_CA_DIR: /app/data/ca
    volumes:
      - anonreq_data:/app/data
    depends_on:
      valkey:
        condition: service_healthy
      presidio-analyzer:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import os, urllib.request; req = urllib.request.Request('http://localhost:8080/health', headers={'Authorization': 'Bearer ' + os.environ['ANONREQ_API_KEY']}); urllib.request.urlopen(req, timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - anonreq-net
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # PostgreSQL — Audit log database (Observability Profile)
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: anonreq-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?err}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?err}
      POSTGRES_DB: ${POSTGRES_DB:-anonreq}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anonreq"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - anonreq-net
    profiles: ["observability"]
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Postgres Exporter — Metrics (Observability Profile)
  # -------------------------------------------------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: anonreq-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-anonreq}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - anonreq-net
    profiles: ["observability"]
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # MinIO — Compliance Archive Object Storage (Observability Profile)
  # -------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: anonreq-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?err}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?err}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anonreq-net
    profiles: ["observability"]
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Prometheus — Metrics Collection Engine (Observability Profile)
  # -------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: anonreq-prometheus
    volumes:
      - ./docker/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      anonreq:
        condition: service_started
    networks:
      - anonreq-net
    profiles: ["observability"]
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Grafana — Visualization Dashboards (Observability Profile)
  # -------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.0.0
    container_name: anonreq-grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/slo_dashboard.json
    volumes:
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - anonreq-net
    profiles: ["observability"]
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Valkey Exporter — Metrics (Observability Profile)
  # -------------------------------------------------------------------------
  valkey-exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: anonreq-valkey-exporter
    environment:
      REDIS_ADDR: redis://valkey:6379
    depends_on:
      valkey:
        condition: service_started
    networks:
      - anonreq-net
    profiles: ["observability"]
    restart: unless-stopped

networks:
  anonreq-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:
  anonreq_data:
