global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/slo_alerts.yml"

scrape_configs:
  - job_name: "anonreq"
    static_configs:
      - targets: ["anonreq:8080"]
    metrics_path: "/metrics"
    scheme: http

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "valkey-exporter"
    static_configs:
      - targets: ["valkey-exporter:9121"]
